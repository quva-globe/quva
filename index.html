<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Ultimate Ecosystem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE SETUP & DYNAMIC MOBILE FIX --- */
        :root {
            --bg-deep: #08080c;
            --card-bg: #121218;
            --accent-pink: #ff2a7a;
            --accent-cyan: #00e5ff;
            --accent-yellow: #ffc107;
            --text-main: #ffffff;
            --text-muted: #8b8b99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            /* 100dvh fixes the missing bottom nav on mobile browsers! */
            height: 100dvh; 
            overflow: hidden; 
        }

        /* The Wider, Colorful App Container */
        .app-container {
            width: 100%;
            max-width: 600px; /* Made wider for the pro feel */
            height: 100%;
            background-color: var(--bg-deep);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05);
        }

        /* --- 2. MAIN HEADER --- */
        .glass-header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
            background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--text-main); }
        .brand h2 { font-size: 24px; font-weight: 800; font-style: italic; letter-spacing: 1px;}
        .brand .dot { color: var(--accent-pink); }
        .header-icons i { font-size: 22px; margin-left: 20px; cursor: pointer; color: var(--accent-cyan); }

        /* --- 3. SCROLLABLE CONTENT AREA --- */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px 100px; /* 100px bottom padding ensures content isn't hidden by nav */
            scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* Pages (Switching logic) */
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 4. COLORFUL CHAT CARDS (Home Page) --- */
        .chat-card {
            display: flex; align-items: center; background: var(--card-bg); padding: 16px;
            border-radius: 20px; gap: 15px; margin-bottom: 15px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        /* Colorful glowing borders for cards */
        .chat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--accent-pink), var(--accent-cyan));
        }

        .avatar { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; color: white; }
        .av-1 { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .av-2 { background: linear-gradient(135deg, #00b4db, #0083b0); }

        .chat-info { flex: 1; }
        .chat-info h4 { font-size: 17px; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px;}
        .chat-info p { font-size: 14px; color: var(--accent-cyan); font-weight: 500; }
        .chat-meta { color: var(--text-muted); font-size: 12px; font-weight: bold; }

        /* --- 5. ACCOUNT PROFILE PAGE (From your screenshot) --- */
        .profile-header { text-align: center; margin-bottom: 25px; margin-top: 10px;}
        .profile-ring { 
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent-yellow); 
            display: flex; justify-content: center; align-items: center; margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3); font-size: 40px; color: var(--accent-yellow);
        }
        .profile-name { font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .role-badge { background: transparent; border: 1px solid var(--accent-yellow); color: var(--accent-yellow); padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-top: 10px; display: inline-block;}
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-box h3 { font-size: 28px; margin-bottom: 5px; }
        .stat-box p { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; font-weight: bold; text-transform: uppercase;}

        .ghost-mode-card {
            background: var(--card-bg); padding: 18px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); margin-bottom: 25px;
        }
        .ghost-info { display: flex; align-items: center; gap: 15px; }
        .ghost-icon { width: 40px; height: 40px; background: rgba(138, 43, 226, 0.1); color: #b28dff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        
        /* Custom Toggle Switch */
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-pink); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* --- 6. PERFECTED BOTTOM NAVIGATION --- */
        .nav-wrapper {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .bottom-nav {
            width: 92%;
            max-width: 500px;
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center; 
            padding: 10px 15px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        
        .nav-item { color: var(--text-muted); font-size: 22px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--text-main); }
        .nav-item:hover { color: var(--accent-cyan); transform: translateY(-3px); }

        /* The Profile Button (From screenshot) */
        .profile-btn {
            background: rgba(255, 42, 122, 0.1);
            color: var(--accent-pink);
            border: 1px solid var(--accent-pink);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .profile-btn.active, .profile-btn:hover {
            background: var(--accent-pink);
            color: white;
            box-shadow: 0 0 15px rgba(255, 42, 122, 0.4);
        }

    </style>
</head>
<body>

<div class="app-container">

    <header class="glass-header">
        <div class="header-left">
            <i class="fa-solid fa-bars menu-btn"></i>
            <div class="brand"><h2>Blendr<span class="dot">.</span></h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-camera"></i>
            <i class="fa-regular fa-pen-to-square"></i>
        </div>
    </header>

    <div class="content-area">
        
        <div class="page active" id="page-home">
            <div class="chat-card">
                <div class="avatar av-1">S</div>
                <div class="chat-info">
                    <h4>Sarah Connor</h4>
                    <p>Typing... <i class="fa-solid fa-pen" style="font-size: 12px;"></i></p>
                </div>
                <div class="chat-meta">Just now</div>
            </div>

            <div class="chat-card">
                <div class="avatar av-2"><i class="fa-solid fa-users"></i></div>
                <div class="chat-info">
                    <h4 style="color: white;">Global Network</h4>
                    <p style="color: var(--text-muted);">Welcome to the ultimate hub...</p>
                </div>
                <div class="chat-meta">10:42 AM</div>
            </div>
        </div>

        <div class="page" id="page-profile">
            <div class="profile-header">
                <div class="profile-ring"><i class="fa-solid fa-moon"></i></div>
                <div class="profile-name">Loading... <i class="fa-solid fa-chevron-right" style="font-size: 16px; color: var(--text-muted);"></i></div>
                <div class="role-badge">ROLE</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <h3>0</h3>
                    <p>Connections</p>
                </div>
                <div class="stat-box">
                    <h3>0<span style="font-size: 18px; color: var(--text-muted);">h</span></h3>
                    <p>Time Healed</p>
                </div>
            </div>

            <div class="ghost-mode-card">
                <div class="ghost-info">
                    <div class="ghost-icon"><i class="fa-solid fa-ghost"></i></div>
                    <div>
                        <h4 style="font-size: 16px; margin-bottom: 3px;">Ghost Mode</h4>
                        <p style="font-size: 13px; color: var(--text-muted);">Stealth online status.</p>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            
            <h4 style="color: var(--text-muted); font-size: 12px; letter-spacing: 1px; margin-bottom: 15px;">THE BASICS</h4>
            </div>

    </div>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <i class="fa-solid fa-house nav-item active" onclick="switchTab('page-home', this)"></i>
            <i class="fa-regular fa-compass nav-item"></i>
            <i class="fa-solid fa-user-group nav-item"></i>
            <i class="fa-solid fa-comment nav-item"></i>
            <div class="profile-btn" onclick="switchTab('page-profile', this)">
                <i class="fa-regular fa-circle-user"></i> PROFILE
            </div>
        </nav>
    </div>

</div>

<script>
    function switchTab(pageId, clickedElement) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active');
        });
        // Remove active class from all nav items
        document.querySelectorAll('.nav-item, .profile-btn').forEach(item => {
            item.classList.remove('active');
        });

        // Show selected page and highlight selected icon
        document.getElementById(pageId).classList.add('active');
        clickedElement.classList.add('active');
    }
</script>
</body>
</html>
