<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blendr | Reels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE & THEME VARIABLES --- */
        :root {
            --bg-deep: #050508; --card-bg: #121218; --accent-pink: #ff2a7a; --accent-cyan: #00e5ff;
            --text-main: #ffffff; --text-muted: #8b8b99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .app-container { width: 100%; max-width: 550px; height: 100%; background: var(--bg-deep); position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 2. SIDEBAR --- */
        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 500; opacity: 0; visibility: hidden; transition: 0.3s; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: absolute; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 501; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 35px 20px 20px; background: #0a0a0f; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan)); display: flex; justify-content: center; align-items: center; font-size: 24px; color: white; margin-bottom: 10px; }
        .sidebar-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-main); font-size: 15px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .sidebar-item:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }

        /* --- 3. GLASS HEADER & PLATFORM SWITCHER --- */
        .glass-header { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: transparent; background-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); z-index: 100; pointer-events: none; }
        .header-left { display: flex; align-items: center; gap: 15px; pointer-events: auto; }
        .menu-btn { font-size: 22px; cursor: pointer; color: white; transition: 0.2s; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .menu-btn:active { transform: scale(0.8); }
        
        /* The Switcher */
        .platform-switcher { display: flex; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 20px; padding: 3px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        .switch-btn { padding: 6px 16px; border-radius: 16px; font-size: 14px; font-weight: bold; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .switch-btn.active.insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; box-shadow: 0 2px 10px rgba(220, 39, 67, 0.5); }
        .switch-btn.active.shorts { background: #ff0000; color: white; box-shadow: 0 2px 10px rgba(255, 0, 0, 0.5); }

        /* --- 4. REELS SNAP SCROLL ENGINE --- */
        .reels-container { flex: 1; height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; background: #000; }
        .reels-container::-webkit-scrollbar { display: none; }
        
        .reel-wrapper { height: 100%; width: 100%; scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center; background: #111; overflow: hidden; }

        /* Simulated Video Backgrounds (Ready for real <video> tags) */
        .vid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: filter 0.3s; }
        .vid-1 { background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%); }
        .vid-2 { background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%); }
        .vid-3 { background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%); }
        
        /* Interactive Overlay Layer */
        .reel-interactive-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; justify-content: center; align-items: center; }

        /* Double Tap Heart Animation */
        .big-heart { color: var(--accent-pink); font-size: 100px; opacity: 0; transform: scale(0); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .big-heart.animate { opacity: 1; transform: scale(1); }

        /* --- 5. REEL UI (User Info & Action Buttons) --- */
        .reel-ui-bottom { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 20px 90px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 10; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; }
        
        .reel-info { flex: 1; padding-right: 15px; pointer-events: auto; }
        .reel-user { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .reel-user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; display: flex; justify-content: center; align-items: center; font-weight: bold; background: #333; color: white; }
        .reel-user h3 { font-size: 16px; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .btn-follow { border: 1px solid white; background: transparent; color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-left: 5px; cursor: pointer; transition: 0.2s; }
        .btn-follow:active { background: white; color: black; }
        .reel-caption { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.4; text-shadow: 0 1px 3px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center; pointer-events: auto; }
        .action-icon { display: flex; flex-direction: column; align-items: center; gap: 4px; color: white; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .action-icon i { font-size: 28px; }
        .action-icon:active i { transform: scale(0.8); }
        .action-icon span { font-size: 12px; font-weight: bold; }
        .action-icon.liked i { color: var(--accent-pink); animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Loader */
        .loader-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 50; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-cyan); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }

        /* --- 6. BOTTOM NAVIGATION --- */
        .nav-wrapper { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .bottom-nav { width: 90%; max-width: 420px; background: rgba(18, 18, 24, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 35px rgba(0,0,0,0.8); pointer-events: auto; }
        .nav-item { color: rgba(255,255,255,0.5); font-size: 22px; padding: 8px; transition: 0.2s; position: relative; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item:active { transform: scale(0.75); }
        .nav-item.active { color: white; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; width: 4px; height: 4px; background: white; border-radius: 50%; }

    </style>
</head>
<body>

<div class="app-container">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-avatar" id="drawer-initial">U</div>
            <h3 style="color: white; font-size: 18px;" id="drawer-name">Your Profile</h3>
            <p style="color: var(--accent-cyan); font-size: 13px;" id="drawer-handle">@username</p>
        </div>
        <div class="sidebar-menu">
            <a href="profile.html" class="sidebar-item"><i class="fa-regular fa-circle-user"></i> My Profile</a>
            <a href="home.html" class="sidebar-item"><i class="fa-solid fa-message"></i> Messages</a>
            <a href="explore.html" class="sidebar-item"><i class="fa-solid fa-compass"></i> Explore</a>
            <a href="settings.html" class="sidebar-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-left">
            <i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i>
        </div>
        <div class="platform-switcher">
            <div class="switch-btn active insta" id="btn-insta" onclick="switchPlatform('insta')">Reels</div>
            <div class="switch-btn shorts" id="btn-shorts" onclick="switchPlatform('shorts')">Shorts</div>
        </div>
        <div style="width: 22px;"></div> </header>

    <div class="loader-container" id="feedLoader">
        <div class="spinner"></div>
    </div>

    <div class="reels-container" id="reelsContainer">
        </div>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
            <a href="explore.html" class="nav-item"><i class="fa-regular fa-compass"></i></a>
            <a href="reels.html" class="nav-item active"><i class="fa-solid fa-play"></i></a>
            <a href="network.html" class="nav-item"><i class="fa-solid fa-user-group"></i></a>
            <a href="profile.html" class="nav-item"><i class="fa-regular fa-circle-user"></i></a>
        </nav>
    </div>

</div>

<script>
    // --- Auth & Sidebar ---
    document.addEventListener("DOMContentLoaded", () => {
        const alias = localStorage.getItem("blendr_user");
        if (!alias) { window.location.href = "login.html"; return; }
        document.getElementById("drawer-handle").textContent = alias;
        document.getElementById("drawer-initial").textContent = alias.charAt(1).toUpperCase() || "U";
        
        // Fetch Reels Data on Load
        fetchReels();
    });

    function toggleSidebar() { 
        document.getElementById('sidebarOverlay').classList.toggle('active'); 
        document.getElementById('sidebar').classList.toggle('active'); 
    }

    // --- Platform Switcher Logic ---
    function switchPlatform(platform) {
        document.getElementById('btn-insta').classList.remove('active', 'insta');
        document.getElementById('btn-shorts').classList.remove('active', 'shorts');
        
        if(platform === 'insta') {
            document.getElementById('btn-insta').classList.add('active', 'insta');
        } else {
            document.getElementById('btn-shorts').classList.add('active', 'shorts');
        }

        // Trigger loading screen to simulate fetching new feed
        document.getElementById('feedLoader').style.display = 'flex';
        document.getElementById('reelsContainer').innerHTML = '';
        setTimeout(fetchReels, 800);
    }

    // --- Dynamic Content Fetching ---
    function fetchReels() {
        // Simulating Backend Response
        const simulatedReelsDB = [
            { id: 1, uploader: "@motion_graphics", caption: "Testing the new 3D render engine. What do you think? 🚀🔥 #design #tech", likes: "124k", comments: "1.2k", bg: "vid-1" },
            { id: 2, uploader: "@daily_vibes", caption: "Just a reminder that you are doing great today. Keep pushing! 💪✨", likes: "89k", comments: "450", bg: "vid-2" },
            { id: 3, uploader: "@cyber_code", caption: "Building a WhatsApp clone in 10 minutes using pure JS. 💻", likes: "205k", comments: "3.4k", bg: "vid-3" }
        ];

        const container = document.getElementById('reelsContainer');
        let html = "";

        simulatedReelsDB.forEach(reel => {
            let initial = reel.uploader.charAt(1).toUpperCase();
            html += `
                <div class="reel-wrapper" id="reel-${reel.id}">
                    <div class="vid-bg ${reel.bg}"></div>
                    
                    <div class="reel-interactive-layer" ondblclick="handleDoubleTap(this)">
                        <i class="fa-solid fa-heart big-heart"></i>
                    </div>

                    <div class="reel-ui-bottom">
                        <div class="reel-info">
                            <div class="reel-user">
                                <div class="reel-user-avatar">${initial}</div>
                                <h3>${reel.uploader}</h3>
                                <button class="btn-follow" onclick="this.textContent = 'Following'; this.style.background='white'; this.style.color='black';">Follow</button>
                            </div>
                            <p class="reel-caption">${reel.caption}</p>
                        </div>
                        
                        <div class="reel-actions">
                            <div class="action-icon like-btn" onclick="toggleLike(this)">
                                <i class="fa-solid fa-heart"></i>
                                <span>${reel.likes}</span>
                            </div>
                            <div class="action-icon">
                                <i class="fa-solid fa-comment-dots"></i>
                                <span>${reel.comments}</span>
                            </div>
                            <div class="action-icon">
                                <i class="fa-solid fa-paper-plane"></i>
                                <span>Share</span>
                            </div>
                            <div class="action-icon">
                                <i class="fa-solid fa-ellipsis-vertical"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById('feedLoader').style.display = 'none';

        // Setup Auto-Play Observer for new videos
        setupVideoObserver();
    }

    // --- Double Tap to Like Engine ---
    function handleDoubleTap(layer) {
        // Trigger Big Heart Animation
        const heart = layer.querySelector('.big-heart');
        heart.classList.add('animate');
        setTimeout(() => heart.classList.remove('animate'), 800);

        // Find the like button in this specific reel and turn it pink
        const wrapper = layer.closest('.reel-wrapper');
        const likeBtn = wrapper.querySelector('.like-btn');
        if(!likeBtn.classList.contains('liked')) {
            toggleLike(likeBtn);
        }
    }

    function toggleLike(btn) {
        btn.classList.toggle('liked');
        const icon = btn.querySelector('i');
        if (btn.classList.contains('liked')) {
            icon.classList.remove('fa-regular');
            icon.classList.add('fa-solid');
        } else {
            icon.classList.remove('fa-solid');
            icon.classList.add('fa-solid'); // Keeps solid base, relies on CSS color
        }
    }

    // --- Intersection Observer (Auto-Play/Pause Logic) ---
    function setupVideoObserver() {
        // When real <video> tags are added, this pauses off-screen videos to save data!
        const options = { root: document.getElementById('reelsContainer'), threshold: 0.6 };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vidBg = entry.target.querySelector('.vid-bg');
                if(entry.isIntersecting) {
                    // Play video logic here: vidBg.play()
                    vidBg.style.filter = "brightness(1)"; 
                } else {
                    // Pause video logic here: vidBg.pause()
                    vidBg.style.filter = "brightness(0.5)"; 
                }
            });
        }, options);

        document.querySelectorAll('.reel-wrapper').forEach(wrapper => {
            observer.observe(wrapper);
        });
    }

</script>
</body>
</html>
